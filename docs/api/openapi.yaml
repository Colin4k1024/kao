components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          nullable: true
      required:
        - code
        - message
    PaginatedResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            records:
              type: array
              items:
                type: object
            total:
              type: integer
            pageSize:
              type: integer
            current:
              type: integer
          required:
            - records
            - total
      required:
        - code
        - message
    RegisterRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        email:
          type: string
        phone:
          type: string
        nickname:
          type: string
      required:
        - username
        - password
    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        email:
          type: string
        phone:
          type: string
        nickname:
          type: string
        deptId:
          type: string
          format: uuid
        roleIds:
          type: array
          items:
            type: string
            format: uuid
        status:
          type: string
          enum: [active, disabled, locked]
      required:
        - username
        - password
    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
        phone:
          type: string
        nickname:
          type: string
        deptId:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, disabled, locked]
    CreateDepartmentRequest:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        parentId:
          type: string
          format: uuid
        leader:
          type: string
        phone:
          type: string
        email:
          type: string
        sort:
          type: integer
        status:
          type: string
          enum: [active, disabled]
      required:
        - code
        - name
    UpdateDepartmentRequest:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        parentId:
          type: string
          format: uuid
        leader:
          type: string
        phone:
          type: string
        email:
          type: string
        sort:
          type: integer
        status:
          type: string
          enum: [active, disabled]
    CreateRoleRequest:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        dataScope:
          type: string
          enum: [all, custom, dept, deptAndChild, self]
        status:
          type: string
          enum: [active, disabled]
      required:
        - code
        - name
    UpdateRoleRequest:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        dataScope:
          type: string
          enum: [all, custom, dept, deptAndChild, self]
        status:
          type: string
          enum: [active, disabled]
    CreateMenuRequest:
      type: object
