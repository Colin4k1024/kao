openapi: 3.0.0
info:
  title: Kao Admin Management System API
  description: Enterprise admin management system API documentation
  contact:
    name: Kao Team
    url: https://github.com/kao-admin/kao
    email: team@kao-admin.com
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Development server
  - url: https://api.kao-admin.com
    description: Production server
paths:
  /api/auth/login:
    post:
      summary: User login
      description: Authenticate user and return JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
                - username
                - password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Invalid credentials
  /api/auth/logout:
    post:
      summary: User logout
      description: Logout current user
      security:
        - Bearer: []
      responses:
        '200':
          description: Logout successful
        '401':
          description: Not authenticated
  /api/auth/refresh:
    post:
      summary: Refresh token
      description: Refresh access token using refresh token
      security:
        - Bearer: []
      responses:
        '200':
          description: Token refreshed successfully
        '401':
          description: Invalid refresh token
components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          nullable: true
      required:
        - code
        - message
  /api/system/users:
    get:
      summary: List users
      description: Get paginated list of users with optional filters
      security:
        - Bearer: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: username
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, disabled, locked]
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          description: Not authenticated
        '403':
          description: Not authorized
    post:
      summary: Create user
      description: Create a new user
      security:
        - Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
        '400':
          description: Validation error
        '401':
          description: Not authenticated
        '403':
          description: Not authorized
  /api/system/users/{id}:
    get:
      summary: Get user detail
      description: Get user information by ID
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: User not found
        '401':
          description: Not authenticated
    put:
      summary: Update user
      description: Update user information
      security:
        - Bearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
        '400':
          description: Validation error
        '401':
          description: Not authenticated
        '403':
          description: Not authorized
    delete:
      summary: Delete user
      description: Delete user by ID
      security:
        - Bearer: []
      parameters:
