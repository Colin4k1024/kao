services:
  postgres:
    image: postgres:16-alpine
    container_name: kao-postgres
    environment:
      POSTGRES_DB: kao_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kao-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kao-backend
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/kao_db
      JWT_SECRET: kao-super-secret-key-2024
      JWT_ACCESS_TOKEN_EXPIRES_IN: 3600
      JWT_REFRESH_TOKEN_EXPIRES_IN: 604800
      RUST_LOG: info
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kao-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kao-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - kao-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  kao-network:
    driver: bridge
