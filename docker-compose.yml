services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-coding-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ruoyi_admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ruoyi_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-coding-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      APP_ENV: ${APP_ENV:-development}
      HOST: 0.0.0.0
      PORT: ${PORT:-3001}
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@postgres:5432/ruoyi_admin}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-development}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
