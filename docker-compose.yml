version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kao-postgres
    environment:
      POSTGRES_DB: kao_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - kao-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kao-backend
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/kao_db
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-change-in-production}
      JWT_ACCESS_TOKEN_EXPIRES_IN: 3600
      JWT_REFRESH_TOKEN_EXPIRES_IN: 604800
      RUST_LOG: info
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kao-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kao-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - kao-network

volumes:
  postgres_data:

networks:
  kao-network:
    driver: bridge
