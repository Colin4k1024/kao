version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kao-postgres
    environment:
      POSTGRES_DB: kao_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kao-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:

networks:
  kao-network:
    driver: bridge
