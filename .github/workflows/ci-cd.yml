name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/kao"
  JWT_SECRET: "test-secret-key"

jobs:
  # Lint and check code style
  lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Run cargo clippy
        working-directory: ./backend
        run: |
          cargo clippy -- -D warnings

  # Run tests
  test:
    name: Rust Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kao
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install SQLx CLI
        uses: actions/setup-go@v4
        with:
          go-version: '>=1.20.0'
          cache: false
        run: |
          cargo install sqlx-cli --no-default-features
      
      - name: Run database migrations
        working-directory: ./backend
        run: |
          DATABASE_URL=$DATABASE_URL sqlx database create
          DATABASE_URL=$DATABASE_URL sqlx migrate run
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      
      - name: Run tests
        working-directory: ./backend
        run: |
          cargo test --all

  # Security scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Security Scan
        run: |
          chmod +x scripts/security/scan.sh
          ./scripts/security/scan.sh --ci
      
      - name: Upload scan report
        uses: actions/upload-artifact@v3
        with:
          name: security-scan-report
          path: reports/

  # Build backend
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [security-scan]
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      
      - name: Build release
        working-directory: ./backend
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: backend-binary
          path: ./backend/target/x86_64-unknown-linux-gnu/release/kao-backend

  # Build frontend
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [build-backend]
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: |
          npm ci
      
      - name: Build project
        working-directory: ./frontend
        run: |
          npm run build

  # Deploy to staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "Backend binary: ${{ needs.build-backend.result }}"
          echo "Frontend build: ${{ needs.build-frontend.result }}"
          # Add deployment commands here

  # Deploy to production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          echo "Backend binary: ${{ needs.build-backend.result }}"
          echo "Frontend build: ${{ needs.build-frontend.result }}"
          # Add deployment commands here
          # Note: Requires manual approval in GitHub settings
